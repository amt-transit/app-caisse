<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>AMT — Mode Livreur</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="favicon.png">

<!-- ZXing pour scan codes-barres/QR via caméra -->
<script src="https://unpkg.com/@zxing/library@latest/umd/index.min.js"></script>

<!-- Firebase (même config que livraison.js) -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<style>
:root {
  --green:   #16a34a;
  --green-l: #dcfce7;
  --green-d: #14532d;
  --orange:  #ea580c;
  --orange-l:#fff7ed;
  --red:     #dc2626;
  --red-l:   #fee2e2;
  --blue:    #2563eb;
  --blue-l:  #dbeafe;
  --wa:      #25D366;
  --wa-d:    #128C7E;
  --bg:      #0f172a;
  --surface: #1e293b;
  --card:    #273344;
  --border:  rgba(255,255,255,0.08);
  --text:    #f1f5f9;
  --muted:   #94a3b8;
  --radius:  16px;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
  overscroll-behavior: none;
  overflow: hidden;
}

/* ── SCREENS ── */
.screen {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  transition: transform 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.35s;
}

.screen.hidden {
  transform: translateY(30px);
  opacity: 0;
  pointer-events: none;
}

/* ── TOP BAR ── */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px;
  padding-top: max(14px, env(safe-area-inset-top));
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.topbar-brand {
  display: flex;
  align-items: center;
  gap: 10px;
}

.topbar-logo {
  width: 34px; height: 34px;
  background: var(--green);
  border-radius: 10px;
  display: flex; align-items:center; justify-content:center;
  font-size: 1.1rem;
}

.topbar-title {
  font-size: 0.9rem;
  font-weight: 800;
  letter-spacing: -0.02em;
}

.topbar-sub {
  font-size: 0.65rem;
  color: var(--muted);
  margin-top: 1px;
}

.topbar-btn {
  padding: 6px 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-size: 0.75rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}

.topbar-btn:active { background: var(--card); }

/* ── MAIN CONTENT ── */
.content {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 16px;
  padding-bottom: max(24px, env(safe-area-inset-bottom));
  -webkit-overflow-scrolling: touch;
}

/* ── SCAN SCREEN ── */
#screen-scan .content {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

/* Camera viewfinder */
.viewfinder-wrap {
  position: relative;
  border-radius: var(--radius);
  overflow: hidden;
  background: #000;
  aspect-ratio: 1 / 1;
  max-height: 300px;
  width: 100%;
}

#video-preview {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.viewfinder-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
}

.viewfinder-box {
  width: 65%;
  aspect-ratio: 1;
  border: 2.5px solid rgba(22,163,74,0.85);
  border-radius: 14px;
  box-shadow: 0 0 0 9999px rgba(0,0,0,0.45);
  position: relative;
}

.viewfinder-box::before,
.viewfinder-box::after {
  content: '';
  position: absolute;
  width: 22px; height: 22px;
  border-color: #22c55e;
  border-style: solid;
}

.viewfinder-box::before {
  top: -2px; left: -2px;
  border-width: 3px 0 0 3px;
  border-radius: 4px 0 0 0;
}

.viewfinder-box::after {
  bottom: -2px; right: -2px;
  border-width: 0 3px 3px 0;
  border-radius: 0 0 4px 0;
}

.scan-line {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, #22c55e, transparent);
  animation: scan-anim 2s ease-in-out infinite;
  border-radius: 1px;
}

@keyframes scan-anim {
  0%   { top: 5%; opacity: 1; }
  50%  { top: 90%; opacity: 0.7; }
  100% { top: 5%; opacity: 1; }
}

.viewfinder-label {
  position: absolute;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 0.7rem;
  color: rgba(255,255,255,0.8);
  background: rgba(0,0,0,0.5);
  padding: 3px 10px;
  border-radius: 20px;
  white-space: nowrap;
}

/* Scan status ring */
.scan-status {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  background: var(--card);
  border-radius: 10px;
  border: 1px solid var(--border);
  font-size: 0.8rem;
  font-weight: 500;
}

.scan-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--green);
  animation: blink 1.2s ease-in-out infinite;
  flex-shrink: 0;
}

@keyframes blink {
  0%,100% { opacity: 1; } 50% { opacity: 0.3; }
}

/* Manual input row */
.manual-row {
  display: flex;
  gap: 8px;
}

.manual-input {
  flex: 1;
  padding: 12px 14px;
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  font-size: 0.9rem;
  font-weight: 600;
  font-family: inherit;
  outline: none;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  transition: border-color 0.2s;
}

.manual-input:focus {
  border-color: var(--green);
}

.manual-input::placeholder {
  color: var(--muted);
  text-transform: none;
  font-weight: 400;
  letter-spacing: 0;
}

.btn-search {
  padding: 12px 16px;
  background: var(--blue);
  border: none;
  border-radius: 12px;
  color: white;
  font-size: 1.1rem;
  cursor: pointer;
  transition: background 0.2s;
  flex-shrink: 0;
}

.btn-search:active { background: #1d4ed8; }

/* ── RESULT CARD ── */
.result-card {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  animation: slide-in 0.3s cubic-bezier(0.4,0,0.2,1);
}

@keyframes slide-in {
  from { transform: translateY(16px); opacity: 0; }
  to   { transform: translateY(0); opacity: 1; }
}

.result-header {
  padding: 14px 16px 10px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.result-ref {
  font-size: 1rem;
  font-weight: 800;
  letter-spacing: -0.01em;
}

.result-status-badge {
  font-size: 0.65rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  padding: 3px 9px;
  border-radius: 20px;
}

.status-en-attente { background: var(--orange-l); color: var(--orange); }
.status-en-cours   { background: var(--blue-l);   color: var(--blue); }
.status-livre      { background: var(--green-l);  color: var(--green-d); }
.status-incident   { background: var(--red-l);    color: var(--red); }

.result-body {
  padding: 14px 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.result-row {
  display: flex;
  align-items: baseline;
  gap: 8px;
}

.result-label {
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--muted);
  font-weight: 600;
  flex-shrink: 0;
  min-width: 78px;
}

.result-value {
  font-size: 0.875rem;
  font-weight: 600;
  color: var(--text);
  word-break: break-word;
}

.result-value.phone {
  color: #67e8f9;
  font-size: 0.925rem;
}

.result-value.amount {
  color: #fbbf24;
  font-weight: 800;
  font-size: 1rem;
}

/* Not found state */
.not-found {
  text-align: center;
  padding: 24px;
  color: var(--muted);
  background: var(--card);
  border-radius: var(--radius);
  border: 1.5px solid var(--border);
}

.not-found-icon { font-size: 2rem; margin-bottom: 8px; }
.not-found-text { font-size: 0.875rem; font-weight: 500; }

/* ── ACTION BUTTONS ── */
.actions-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  padding: 0 16px 16px;
}

.action-btn {
  font-weight: 700;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  transition: transform 0.15s, opacity 0.15s;
  font-family: inherit;
  letter-spacing: 0.01em;
  line-height: 1.2;
  padding: 12px 4px;
  border-radius: 12px;
  border: none;
  font-size: 0.7rem;
}

.action-btn:active { transform: scale(0.95); opacity: 0.85; }

.action-btn .btn-icon { font-size: 1.4rem; line-height: 1; margin-bottom: 4px; }

.btn-wa {
  background: var(--wa);
  color: white;
  font-size: 0.8rem;
}


.btn-photo {
  background: #7c3aed;
  color: white;
}

.btn-partial {
  background: var(--orange);
  color: white;
}

.btn-incident {
  background: var(--red);
  color: white;
}

.btn-wa:disabled {
  opacity: 0.4;
  pointer-events: none;
}

/* ── PHOTO PREVIEW ── */
.photos-row {
  display: flex;
  gap: 8px;
  padding: 0 16px 10px;
  overflow-x: auto;
  scrollbar-width: none;
}

.photos-row::-webkit-scrollbar { display: none; }

.photo-thumb {
  width: 72px;
  height: 72px;
  border-radius: 10px;
  object-fit: cover;
  border: 2px solid var(--green);
  flex-shrink: 0;
  cursor: pointer;
  transition: transform 0.15s;
}

.photo-thumb:active { transform: scale(0.9); }

.photo-add-btn {
  width: 72px; height: 72px;
  border-radius: 10px;
  border: 2px dashed var(--border);
  background: var(--card);
  color: var(--muted);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-size: 1.3rem;
  cursor: pointer;
  flex-shrink: 0;
  transition: border-color 0.2s;
}

.photo-add-btn:active { border-color: var(--green); }

.photo-count-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 4px 10px;
  background: #7c3aed33;
  border: 1px solid #7c3aed66;
  border-radius: 20px;
  font-size: 0.7rem;
  font-weight: 700;
  color: #a78bfa;
  margin: 0 16px 10px;
  align-self: flex-start;
}

/* ── HISTORY SCREEN ── */
#screen-history .content {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.history-item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 14px;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  transition: background 0.15s;
}

.history-item:active { background: var(--surface); }

.history-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

.history-dot.livre    { background: var(--green); }
.history-dot.incident { background: var(--red); }
.history-dot.pending  { background: var(--orange); }

.history-info { flex: 1; min-width: 0; }

.history-ref {
  font-size: 0.875rem;
  font-weight: 700;
}

.history-dest {
  font-size: 0.75rem;
  color: var(--muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-top: 2px;
}

.history-time {
  font-size: 0.65rem;
  color: var(--muted);
  flex-shrink: 0;
}

/* ── BOTTOM NAV ── */
.bottom-nav {
  display: flex;
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding-bottom: max(10px, env(safe-area-inset-bottom));
  flex-shrink: 0;
}

.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 10px 4px 6px;
  gap: 3px;
  cursor: pointer;
  transition: color 0.2s;
  color: var(--muted);
  font-size: 0.6rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  border: none;
  background: none;
  font-family: inherit;
}

.nav-item .nav-icon { font-size: 1.3rem; line-height: 1; }

.nav-item.active { color: var(--green); }

/* ── TOAST ── */
#toast {
  position: fixed;
  top: max(60px, env(safe-area-inset-top) + 60px);
  left: 50%;
  transform: translateX(-50%) translateY(-80px);
  background: #1e293b;
  border: 1px solid var(--border);
  color: var(--text);
  padding: 10px 18px;
  border-radius: 100px;
  font-size: 0.82rem;
  font-weight: 600;
  z-index: 9999;
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
  white-space: nowrap;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  pointer-events: none;
  max-width: calc(100vw - 32px);
}

#toast.show { transform: translateX(-50%) translateY(0); }
#toast.success { background: #052e16; border-color: #166534; }
#toast.error   { background: #450a0a; border-color: #991b1b; }

/* ── LOADING OVERLAY ── */
#loading {
  position: fixed;
  inset: 0;
  background: rgba(15,23,42,0.8);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 8888;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
  backdrop-filter: blur(4px);
}

#loading.show { opacity: 1; pointer-events: auto; }

.spinner {
  width: 40px; height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--green);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ── SUCCESS FLASH ── */
.success-flash {
  position: fixed;
  inset: 0;
  background: rgba(22,163,74,0.18);
  z-index: 7777;
  pointer-events: none;
  animation: flash 0.5s ease-out forwards;
}

@keyframes flash {
  0%   { opacity: 1; }
  100% { opacity: 0; }
}

/* ── DIVIDER ── */
.section-label {
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--muted);
  font-weight: 700;
  padding: 0 2px;
  margin-top: 4px;
}

/* Empty state in scan */
.scan-empty {
  text-align: center;
  padding: 20px;
  color: var(--muted);
  font-size: 0.8rem;
}

.scan-empty .icon { font-size: 2.5rem; margin-bottom: 8px; }

/* Daily counter */
.daily-counter {
  display: flex;
  gap: 8px;
  padding: 10px 14px;
  background: var(--card);
  border-radius: 12px;
  border: 1px solid var(--border);
}

.counter-item {
  flex: 1;
  text-align: center;
}

.counter-num {
  font-size: 1.4rem;
  font-weight: 800;
  line-height: 1;
}

.counter-num.green  { color: #4ade80; }
.counter-num.orange { color: #fb923c; }
.counter-num.red    { color: #f87171; }

.counter-lbl {
  font-size: 0.6rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-top: 3px;
}

/* Input file (caché) */
#photoInput { display: none; }
</style>
</head>
<body>

<!-- TOAST -->
<div id="toast"></div>

<!-- LOADING -->
<div id="loading"><div class="spinner"></div></div>

<!-- HIDDEN FILE INPUT FOR PHOTOS -->
<input type="file" id="photoInputCamera" accept="image/*" capture="environment" style="display:none">
<input type="file" id="photoInputGallery" accept="image/*,video/*" multiple style="display:none">

<!-- ═══════════════════════════════════════
     SCREEN 1 : SCAN / RECHERCHE
     ═══════════════════════════════════════ -->
<div class="screen" id="screen-scan">
  <div class="topbar">
    <div class="topbar-brand">
      <div class="topbar-logo">📦</div>
      <div>
        <div class="topbar-title">AMT TRANS'IT</div>
        <div class="topbar-sub">Mode Livreur</div>
      </div>
    </div>
    <div style="display:flex; gap:8px;">
        <button class="topbar-btn" onclick="window.location.reload()" style="padding: 6px 10px; font-size: 1.1rem;">↻</button>
        <button class="topbar-btn" onclick="showScreen('history')">Historique</button>
    </div>
  </div>

  <div class="content" id="scan-content">

    <!-- Compteur journalier -->
    <div class="daily-counter">
      <div class="counter-item">
        <div class="counter-num green" id="cnt-livre">0</div>
        <div class="counter-lbl">Livrés</div>
      </div>
      <div class="counter-item">
        <div class="counter-num orange" id="cnt-pending">0</div>
        <div class="counter-lbl">En attente</div>
      </div>
      <div class="counter-item">
        <div class="counter-num red" id="cnt-incident">0</div>
        <div class="counter-lbl">Incidents</div>
      </div>
    </div>

    <!-- Caméra scan -->
    <div class="section-label">Scanner le code-barres / QR</div>
    <div class="viewfinder-wrap" id="viewfinder-wrap">
      <video id="video-preview" autoplay muted playsinline></video>
      <div class="viewfinder-overlay">
        <div class="viewfinder-box">
          <div class="scan-line"></div>
        </div>
      </div>
      <div class="viewfinder-label" id="scan-label">Pointez vers un code-barres</div>
    </div>

    <div class="scan-status">
      <div class="scan-dot" id="scan-dot"></div>
      <span id="scan-status-text">Caméra active — prête à scanner</span>
    </div>

    <!-- Saisie manuelle -->
    <div class="section-label">Ou saisir manuellement</div>
    <div class="manual-row">
      <input type="text" class="manual-input" id="manual-ref" placeholder="Ex: AMT-2024-001"
             oninput="this.value=this.value.toUpperCase()"
             onkeydown="if(event.key==='Enter') searchDelivery(this.value.trim())">
      <button class="btn-search" onclick="searchDelivery(document.getElementById('manual-ref').value.trim())">🔍</button>
    </div>

    <!-- Zone résultat (injectée dynamiquement) -->
    <div id="result-zone"></div>

  </div><!-- /content -->

  <!-- Photos (hors content pour ne pas scroller) -->
  <div id="photos-section" style="display:none;">
    <div class="photo-count-badge" id="photo-count-badge">📷 0 photo(s)</div>
    <div class="photos-row" id="photos-row">
      <div class="photo-add-btn" onclick="addPhoto()">
        <span>📷</span>
        <span style="font-size:0.6rem; margin-top:2px;">Ajouter</span>
      </div>
    </div>
  </div>

  <!-- Action buttons (hors content pour rester visible) -->
  <div class="actions-grid" id="actions-grid" style="display:none; padding:10px 16px 14px;">
    <button class="action-btn btn-wa" id="btn-wa" onclick="sendToWhatsAppAndMarkDone()" disabled>
      <span class="btn-icon">💬</span>
      WhatsApp & Livrer
    </button>
    <button class="action-btn btn-photo" onclick="addPhoto()">
      <span class="btn-icon">📷</span>
      Photo
    </button>
    <button class="action-btn btn-incident" onclick="markIncident()">
      <span class="btn-icon">⚠️</span>
      Incident
    </button>
  </div>

  <div class="bottom-nav">
    <button class="nav-item active" id="nav-scan" onclick="showScreen('scan')">
      <span class="nav-icon">📷</span>Scanner
    </button>
    <button class="nav-item" id="nav-history" onclick="showScreen('history')">
      <span class="nav-icon">📋</span>Historique
    </button>
    <button class="nav-item" id="nav-back" onclick="window.location.href='index.html'">
      <span class="nav-icon">🏠</span>Bureau
    </button>
  </div>
</div>

<!-- ═══════════════════════════════════════
     SCREEN 2 : HISTORIQUE JOURNÉE
     ═══════════════════════════════════════ -->
<div class="screen hidden" id="screen-history">
  <div class="topbar">
    <div class="topbar-brand">
      <div class="topbar-logo" style="background:#334155;">📋</div>
      <div>
        <div class="topbar-title">Aujourd'hui</div>
        <div class="topbar-sub" id="history-date"></div>
      </div>
    </div>
    <button class="topbar-btn" onclick="showScreen('scan')">← Retour</button>
  </div>

  <div class="content" id="history-list">
    <div class="scan-empty">

// ── SCANNER (ZXing) ──
async function initScanner() {
    try {
        codeReader = new ZXing.BrowserMultiFormatReader();
        const videoEl = document.getElementById('video-preview');

        codeReader.decodeFromConstraints(
            { video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } } },
            videoEl,
            (result, err) => {
                if (result) {
                    if (isScanningPaused) return; // Ignore la caméra si en pause

                    let text = result.getText().trim().toUpperCase();
                    
                    // Tentative d'extraction intelligente (Regex comme dans livraison.js)
                    // Cherche motif type BA-123-E2 au milieu d'un texte
                    const refMatch = text.match(/([A-Z]{2})[-_.\s]*(\d{3})[-_.\s]*([A-Z0-9]{2,3})/i);
                    if (refMatch) {
                        text = `${refMatch[1]}-${refMatch[2]}-${refMatch[3]}`.toUpperCase();
                    }

                    // Anti-doublon : ne pas rescanner le même code en < 3s
                    if (text === (window._lastScan || '') && Date.now() - (window._lastScanTime || 0) < 3000) return;
                    window._lastScan = text;
                    window._lastScanTime = Date.now();

                    vibrate([30, 20, 30]); // Vibration courte = scan réussi
                    document.getElementById('scan-label').textContent = `✓ ${text}`;
                    document.getElementById('manual-ref').value = text;
                    searchDelivery(text);
                }
            }
        );

        document.getElementById('scan-status-text').textContent = 'Caméra active — prête à scanner';
        scannerActive = true;

    } catch (e) {
        console.warn('Scanner caméra non disponible:', e);
        document.getElementById('viewfinder-wrap').style.display = 'none';
        document.getElementById('scan-status-text').textContent = '⚠️ Caméra non disponible — saisir manuellement';
    }
}

// ── RECHERCHE LIVRAISON ──
async function searchDelivery(ref) {
    if (!ref || ref.length < 2) return;
    
    isScanningPaused = true; // <-- PAUSE LE SCANNER IMMÉDIATEMENT
    
    showLoading(true);

    try {
        // 1. Nettoyage de la référence (Majuscules + Trim)
        const cleanRef = ref.trim().toUpperCase();

        // 2. Recherche exacte
        let snap = await db.collection('livraisons').where('ref', '==', cleanRef).limit(1).get();

        // 3. Si pas trouvé, essai avec nettoyage de suffixe (ex: BA-123-E2_1_4 -> BA-123-E2)
        if (snap.empty && cleanRef.includes('_')) {
             const baseRef = cleanRef.split('_')[0];
             snap = await db.collection('livraisons').where('ref', '==', baseRef).limit(1).get();
        }

        showLoading(false);

        if (snap.empty) {
            showNotFound(ref);
        } else {
            const doc = snap.docs[0];
            currentDelivery = { id: doc.id, ...doc.data() };
            capturedPhotos = [];
            renderResult(currentDelivery);
        }
    } catch (e) {
        showLoading(false);
        showToast('Erreur connexion Firebase', 'error');
    }
}

function handlePhotoCapture(event) {
    const files = Array.from(event.target.files);
    if (!files.length) return;

    files.forEach(file => {
        const isVideo = file.type.startsWith('video/');
        const isImage = file.type.startsWith('image/');

        if (!isImage && !isVideo) {
            showToast(`Format ${file.type} non supporté`, 'error');
            return;
        }

        if (isImage) {
            const reader = new FileReader();
            reader.onload = (e) => {
                capturedPhotos.push({ previewUrl: e.target.result, file: file, type: 'image' });
                updatePhotosUI();
                if (capturedPhotos.length > 0) document.getElementById('btn-wa').disabled = false;
            };
            reader.readAsDataURL(file);
        } else { // isVideo
            const previewUrl = URL.createObjectURL(file);
            capturedPhotos.push({ previewUrl: previewUrl, file: file, type: 'video' });
            updatePhotosUI();
            if (capturedPhotos.length > 0) document.getElementById('btn-wa').disabled = false;
        }
    });
    
    if(files.length > 0) {
        showToast(`✅ ${capturedPhotos.length} média(s) prêt(s)`, 'success');
    }

    event.target.value = ''; // Reset pour permettre re-sélection
}

function updatePhotosUI() {
    const count = capturedPhotos.length;
    const badge = document.getElementById('photo-count-badge');
    badge.innerHTML = `📷 ${count} média${count > 1 ? 's' : ''}`;

    const row = document.getElementById('photos-row');
    row.innerHTML = `
        <div class="photo-add-btn" onclick="addPhoto()">
            <span>➕</span>
            <span style="font-size:0.6rem; margin-top:2px;">Ajouter</span>
        </div>
    ` + capturedPhotos.map((p, i) => {
        if (p.type === 'video') {
            return `<video src="${p.previewUrl}" class="photo-thumb" onclick="viewPhoto(${i})" title="Vidéo ${i+1}" muted autoplay loop playsinline></video>`;
        }
        return `<img src="${p.previewUrl}" class="photo-thumb" onclick="viewPhoto(${i})" title="Photo ${i+1}">`;
    }).join('');
}

function viewPhoto(index) {
    const media = capturedPhotos[index];
    if (!media) return;

    const overlay = document.createElement('div');
    overlay.style.cssText = `position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:9990;display:flex;flex-direction:column;align-items:center;justify-content:center;`;
    
    let mediaElement;
    let actionButtons = '';

    if (media.type === 'image') {
        mediaElement = `<img id="overlay-img-${index}" src="${media.previewUrl}" style="max-width:96%;max-height:80vh;border-radius:12px;object-fit:contain;">`;
        actionButtons += `<button onclick="rotatePhoto(${index})" style="background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.5);color:white;font-size:1.5rem;width:50px;height:50px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;">↻</button>`;
    } else { // video
        mediaElement = `<video src="${media.previewUrl}" style="max-width:96%;max-height:80vh;border-radius:12px;" controls autoplay></video>`;
    }

    overlay.innerHTML = `
        <div style="position:relative;">${mediaElement}</div>
        <div style="display:flex;gap:20px; margin-top: 15px;">
            ${actionButtons}
            <button onclick="deletePhoto(${index}, true)" style="background:#b91c1c;border:none;color:white;font-size:1.2rem;width:50px;height:50px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;">🗑️</button>
            <button onclick="this.parentElement.parentElement.remove()" style="background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.5);color:white;font-size:1.5rem;width:50px;height:50px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;">✕</button>
        </div>
    `;

    overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
    document.body.appendChild(overlay);
}

function deletePhoto(index, fromOverlay = false) {
    const media = capturedPhotos[index];
    if (!media) return;

    if (media.type === 'video') {
        URL.revokeObjectURL(media.previewUrl);
    }
    capturedPhotos.splice(index, 1);
    updatePhotosUI();

    if (fromOverlay) {
        const overlay = document.querySelector('div[style*="background:rgba(0,0,0,0.92)"]');
        if (overlay) overlay.remove();
    }
    
    if (capturedPhotos.length === 0) {
        document.getElementById('btn-wa').disabled = true;
    }
    showToast('Média supprimé', 'success');
}

function rotatePhoto(index) {
    const media = capturedPhotos[index];
    if (!media || media.type !== 'image') return;

    const img = new Image();
    img.src = media.previewUrl;
    img.onload = () => {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = img.height;
        canvas.height = img.width;
        ctx.translate(canvas.width/2, canvas.height/2);
        ctx.rotate(90 * Math.PI / 180);
        ctx.drawImage(img, -img.width/2, -img.height/2);
        const newPreviewUrl = canvas.toDataURL('image/jpeg');
        
        canvas.toBlob(newBlob => {
            const newFile = new File([newBlob], media.file.name, {type: 'image/jpeg', lastModified: Date.now()});
            capturedPhotos[index] = { ...media, previewUrl: newPreviewUrl, file: newFile };

            const overlayImg = document.getElementById(`overlay-img-${index}`);
            if(overlayImg) overlayImg.src = newPreviewUrl;
            
            // We need to find the thumbnail and update it too
            const thumbs = document.querySelectorAll('.photo-thumb');
            const thumbToUpdate = Array.from(thumbs).find(t => t.title.includes(index+1));
            if(thumbToUpdate) thumbToUpdate.src = newPreviewUrl;

        }, 'image/jpeg');
    };
}

// ══════════════════════════════════════════════════════════
//  WHATSAPP — STRATÉGIE MULTI-CIBLE EN 1 CLIC
//  
//  Fonctionnement :
//  1. On construit le message texte (ref + lieu + montant)
//  2. Si on a des photos → Web Share API (natif Android/iOS)
//     → ouvre le sélecteur de partage du téléphone
//     → le livreur choisit WhatsApp + choisit le groupe
//     → LA PHOTO ET LE TEXTE sont pré-remplis
//  3. Si pas de photo → lien wa.me avec texte pré-rempli
//     → s'ouvre directement dans WhatsApp
//
//  TEMPS ESTIMÉ : 8-12 secondes (vs 30-40s avant)
// ══════════════════════════════════════════════════════════

async function sendToWhatsAppAndMarkDone() {
    if (!currentDelivery) return;

    const qtyInput = document.getElementById('scan-qty');
    const qty = qtyInput ? (parseInt(qtyInput.value) || 1) : 1;
    const totalQty = parseInt(currentDelivery.quantite) || 1;
    const livreurName = sessionStorage.getItem('userName') || 'Scan Livreur';
    let isPartial = false;

    // --- GESTION LIVRAISON PARTIELLE ---
    if (qty < totalQty) {
        isPartial = true;
    }

    showLoading(true);

    // --- LOGIQUE PROGRAMME AUTOMATIQUE ---
    const today = new Date().toISOString().split('T')[0]; // Format YYYY-MM-DD

    try {
        if (isPartial) {
            const remainingQty = totalQty - qty;

            // On ne crée pas de nouveau document. On met à jour l'original.
            await db.collection('livraisons').doc(currentDelivery.id).update({
                quantite: remainingQty, // La nouvelle quantité est ce qu'il reste à livrer
                status: 'EN_COURS',      // Le statut global reste 'EN_COURS'
                // On ajoute un enregistrement dans un tableau pour garder l'historique
                historiquePartiel: firebase.firestore.FieldValue.arrayUnion({
                    quantiteLivree: qty,
                    date: new Date().toISOString(),
                    livreur: livreurName
                }),
                scanProof: true // Marquer comme scanné même si partiel
            });

            // Mise à jour de l'objet local pour l'affichage
            currentDelivery.quantite = remainingQty;
            
            showToast(`✅ Partiel validé ! Reste à livrer : ${remainingQty}`, 'success');
            
            // Feedback visuel et haptique
            const flash = document.createElement('div');
            flash.className = 'success-flash';
            document.body.appendChild(flash);
            setTimeout(() => flash.remove(), 600);
            vibrate([50, 30, 50]);
            
            // On rafraîchit la carte pour afficher la quantité restante
            renderResult(currentDelivery); 

        } else {
            // CAS STANDARD (Tout livré)
            const updates = {
                status: 'LIVRE',
                containerStatus: 'EN_COURS',
                dateLivraison: new Date().toISOString(),
                livreur: livreurName,
                quantiteLivree: qty,
                scanProof: true
            };

            // Si le colis n'est pas déjà dans un programme, on l'ajoute à celui du jour
            if (!currentDelivery.dateProgramme) {
                updates.dateProgramme = today;
            }

            await db.collection('livraisons').doc(currentDelivery.id).update(updates);

            finalizeDeliveryUI('LIVRE');
        }

        updateCounters();

    } catch (e) {
        showLoading(false);
        showToast('Erreur lors de la mise à jour', 'error');
        return; // On arrête si la mise à jour DB échoue
    }

    // Si c'était partiel, currentDelivery a été modifié pour refléter le RESTE.
    // Mais pour le message WhatsApp, on veut parler de ce qu'on vient de livrer.
    // On reconstruit un objet temporaire pour le message.
    let deliveryForMsg = currentDelivery;
    if (isPartial) {
        deliveryForMsg = {
            ...currentDelivery,
            quantite: qty,
            status: 'PARTIEL'
        };
    }
    
    sendWhatsAppMessage(deliveryForMsg, livreurName, isPartial, totalQty);
}

function finalizeDeliveryUI(status) {
    currentDelivery.status = status;
    document.getElementById('btn-wa').disabled = true;

    // Flash vert
    const flash = document.createElement('div');
    flash.className = 'success-flash';
    document.body.appendChild(flash);
    setTimeout(() => flash.remove(), 600);

    vibrate([50, 30, 50, 30, 100]);
    showToast('✅ Livraison confirmée !', 'success');

    // Mettre à jour le badge statut dans le card
    const badge = document.querySelector('.result-status-badge');
    if (badge) {
        badge.textContent = status === 'PARTIEL' ? '🌗 Partiel' : '✅ Livré';
        badge.className = `result-status-badge ${status === 'PARTIEL' ? 'status-en-attente' : 'status-livre'}`;
    }

    addToHistory(currentDelivery, status === 'PARTIEL' ? 'pending' : 'livre');
}

async function sendWhatsAppMessage(d, livreurName, isPartial, totalQty) {

    const name  = getClientName(d);
    const phone = extractPhone(d);

    let msgHeader = `✅ Colis : ${d.ref}`;
    if (isPartial) msgHeader += ` (Partiel: ${d.quantite}/${totalQty})`;

    // Texte propre (sans * Markdown) pour l'overlay image
    const plainMessage = [
        msgHeader,
        `👤 Client : ${name}`,
        `📍 Lieu : ${d.lieuLivraison || '—'}`,
        `LIVRÉ PAR : ${livreurName}`
    ].filter(Boolean).join('\n');

    // Texte avec Markdown pour WhatsApp texte seul
    const richMessage = [
        `✅ Colis : *${d.ref}*` + (isPartial ? ` (Partiel: ${d.quantite}/${totalQty})` : ''),
        `👤 Client : ${name}`,
        `📍 Lieu : ${d.lieuLivraison || '—'}`,
        ``,
        `*LIVRÉ PAR : ${livreurName}*`
    ].join('\n');

    // ── FONCTION : Stamp du texte en overlay sur une image ──
    async function stampTextOnImage(photoItem, text) {
        return new Promise((resolve) => {
            const img = new Image();
            img.onload = () => {
                const canvas  = document.createElement('canvas');
                canvas.width  = img.width;
                canvas.height = img.height;
                const ctx     = canvas.getContext('2d');

                // Image originale
                ctx.drawImage(img, 0, 0);

                // Paramètres typographiques adaptés à la taille de l'image
                const lines    = text.split('\n').filter(l => l.trim() !== '');
                const fontSize = Math.max(28, Math.round(img.width * 0.034));
                const pad      = Math.round(fontSize * 0.9);
                const lineH    = Math.round(fontSize * 1.6);
                const boxH     = lines.length * lineH + pad * 2;
                const margin   = Math.round(img.height * 0.018);
                const boxX     = margin;
                const boxY     = img.height - boxH - margin;
                const boxW     = img.width  - margin * 2;
                const r        = 20; // border-radius

                // Fond noir semi-transparent arrondi
                ctx.fillStyle = 'rgba(0, 0, 0, 0.75)';
                ctx.beginPath();
                ctx.moveTo(boxX + r, boxY);
                ctx.lineTo(boxX + boxW - r, boxY);
                ctx.quadraticCurveTo(boxX + boxW, boxY,         boxX + boxW, boxY + r);
                ctx.lineTo(boxX + boxW,           boxY + boxH - r);
                ctx.quadraticCurveTo(boxX + boxW, boxY + boxH,  boxX + boxW - r, boxY + boxH);
                ctx.lineTo(boxX + r,              boxY + boxH);
                ctx.quadraticCurveTo(boxX,        boxY + boxH,  boxX, boxY + boxH - r);
                ctx.lineTo(boxX,                  boxY + r);
                ctx.quadraticCurveTo(boxX,        boxY,         boxX + r, boxY);
                ctx.closePath();
                ctx.fill();

                // Écriture des lignes avec couleurs distinctes
                ctx.font         = `700 ${fontSize}px 'Plus Jakarta Sans', Arial, sans-serif`;
                ctx.textBaseline = 'top';

                lines.forEach((line, i) => {
                    const yTxt = boxY + pad + i * lineH;
                    // Ligne 1 (référence colis) → vert vif
                    if (i === 0) {
                        ctx.fillStyle = '#4ade80';
                    // Dernière ligne (livreur) → doré
                    } else if (i === lines.length - 1) {
                        ctx.fillStyle = '#fbbf24';
                    // Lignes client/lieu → blanc
                    } else {
                        ctx.fillStyle = '#ffffff';
                    }
                    ctx.fillText(line, boxX + pad, yTxt);
                });

                canvas.toBlob(blob => {
                    resolve(new File([blob], `livraison_${d.ref || 'photo'}.jpg`, { type: 'image/jpeg' }));
                }, 'image/jpeg', 0.93);
            };
            img.onerror = () => resolve(photoItem.file); // fallback : fichier original si erreur
            img.src = photoItem.previewUrl;
        });
    }

    // ── CAS 1 : Médias disponibles → stamp + Web Share API ──
    if (capturedPhotos.length > 0 && navigator.share) {
        try {
            showToast('⏳ Préparation des photos...', '');

            const filesToShare = [];
            for (const p of capturedPhotos) {
                if (p.type === 'image') {
                    // Stamp sur TOUTES les images : le texte voyage toujours avec la photo
                    const stamped = await stampTextOnImage(p, plainMessage);
                    filesToShare.push(stamped);
                } else {
                    // Vidéo : impossible de stamper, on envoie telle quelle
                    filesToShare.push(p.file);
                }
            }

            // Tenter avec texte (iOS le supporte bien, Android parfois)
            const shareWithText = { files: filesToShare, text: richMessage };
            const shareNoText   = { files: filesToShare };
            const canWithText   = navigator.canShare && navigator.canShare(shareWithText);
            const canNoText     = navigator.canShare && navigator.canShare(shareNoText);

            if (canWithText || canNoText) {
                showLoading(false);
                await navigator.share(canWithText ? shareWithText : shareNoText);
                showToast('📤 Photos partagées avec les infos !', 'success');
                return;
            }
        } catch (e) {
            showLoading(false);
            if (e.name === 'AbortError') return; // Annulé par l'utilisateur
            console.warn('Share API error:', e);
            // Continuer vers les fallbacks
        }
    }

    // ── CAS 2 : Pas de médias ou share a échoué → texte seul ──
    if (navigator.share) {
        try {
            showLoading(false);
            await navigator.share({ text: richMessage });
            showToast('📤 Message partagé !', 'success');
            return;
        } catch (e) {
            showLoading(false);
            if (e.name === 'AbortError') return;
        }
    }

    // ── CAS 3 : Fallback final → wa.me direct ou presse-papier ──
    showLoading(false);
    if (phone) {
        let clean = phone.replace(/[^\d]/g, '');
        if (!clean.startsWith('225') && clean.length === 10) clean = '225' + clean;
        window.open(`https://wa.me/${clean}?text=${encodeURIComponent(richMessage)}`, '_blank');
        showToast('📱 WhatsApp ouvert', 'success');
    } else {
        try {
            await navigator.clipboard.writeText(richMessage);
            showToast('📋 Message copié ! Colle-le dans WhatsApp', 'success');
        } catch {
            showToast('⚠️ Pas de numéro disponible', 'error');
        }
    }
}

// ── UTILS ──
function getClientName(d) {
    const exp = (d.expediteur || '').toUpperCase();
    if (exp.includes('AMT')) {
        return cleanName(d.destinataire) || 'Client';
    }
    return cleanName(d.expediteur) || cleanName(d.destinataire) || 'Client';
}

function extractPhone(d) {
    const phoneRegex = /(?:(?:\+|00)225[\s.-]?)?(?:01|05|07|0)\d(?:[\s.-]?\d{2}){4}|(?:(?:\+|00)225[\s.-]?)?(?:01|05|07|0)\d{8,}/;
    const sources = [d.numero, d.destinataire, d.description, d.info];
    for (const s of sources) {
        if (!s) continue;
        const m = s.match(phoneRegex);
        if (m) return m[0];
    }
    return '';
}

function cleanName(str) {
    if (!str) return '';
    return str.replace(/(?:(?:\+|00)225[\s.-]?)?(?:01|05|07|0)\d(?:[\s.-]?\d{2}){4}|(?:(?:\+|00)225[\s.-]?)?(?:01|05|07|0)\d{8,}/g, '').trim().replace(/[-–,;:\s]+$/, '');
}

function vibrate(pattern) {
    if (navigator.vibrate) navigator.vibrate(pattern);
}

// ── GPS CAPTURE ──
async function captureGPS(id) {
    if (!navigator.geolocation) {
        showToast("Géolocalisation non supportée.", "error");
        return;
    }
    
    const btn = event.target;
    const originalText = btn.textContent;
    btn.disabled = true; 
    btn.textContent = "⏳";

    navigator.geolocation.getCurrentPosition(
        async (position) => {
            const lat = position.coords.latitude.toFixed(6);
            const lng = position.coords.longitude.toFixed(6);
            let gpsCoords = `${lat}, ${lng}`;
            
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18&addressdetails=1`, {
                    headers: { 'Accept-Language': 'fr' }
                });
                const data = await response.json();
                if (data && data.address) {
                    const addr = data.address;
                    const parts = [];
                    if (addr.road) parts.push(addr.road);
                    else if (addr.public_building) parts.push(addr.public_building);
                    if (addr.suburb) parts.push(addr.suburb);
                    else if (addr.neighbourhood) parts.push(addr.neighbourhood);
                    if (addr.city || addr.town || addr.village) parts.push(addr.city || addr.town || addr.village);
                    if (parts.length > 0) gpsCoords = `${parts.join(', ')} [${lat}, ${lng}]`;
                }
            } catch (e) { console.warn("Erreur reverse geocoding", e); }
            
            try {
                await db.collection('livraisons').doc(id).update({ lieuLivraison: gpsCoords });
                const locEl = document.getElementById('delivery-location');
                if(locEl) locEl.textContent = gpsCoords;
                if(currentDelivery) currentDelivery.lieuLivraison = gpsCoords;
                showToast("📍 Adresse mise à jour !", "success");
            } catch(e) { showToast("Erreur mise à jour", "error"); } 
            finally { btn.disabled = false; btn.textContent = originalText; }
        },
        (error) => { showToast("Erreur GPS: " + error.message, "error"); btn.disabled = false; btn.textContent = originalText; },
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
    );
}

// ── HISTORIQUE LOCAL ──
function addToHistory(d, type) {
    const entry = {
        ref: d.ref,
        dest: getClientName(d),
        lieu: d.lieuLivraison,
        type,
        time: Date.now()
    };
    todayHistory.unshift(entry);
    renderHistory();
}

function renderHistory() {
    const el = document.getElementById('history-list');
    if (!todayHistory.length) {
        el.innerHTML = `<div class="scan-empty"><div class="icon">📭</div>Aucune livraison aujourd'hui</div>`;
        return;
    }
    el.innerHTML = todayHistory.map(h => `
        <div class="history-item">
            <div class="history-dot ${h.type === 'livre' ? 'livre' : h.type === 'incident' ? 'incident' : 'pending'}"></div>
            <div class="history-info">
                <div class="history-ref">${h.ref}</div>
                <div class="history-dest">${h.dest || '—'} · ${h.lieu || '—'}</div>
            </div>
            <div class="history-time">${new Date(h.time).toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'})}</div>
        </div>
    `).join('');
}

// ── COMPTEURS JOURNALIERS ──
async function loadTodayStats() {
    try {
        const today = new Date();
        today.setHours(0,0,0,0);
        const snap = await db.collection('livraisons')
            .where('dateLivraison', '>=', today.toISOString())
            .get();

        let livre = 0, incident = 0, pending = 0;
        snap.forEach(doc => {
            const s = doc.data().status;
            if (s === 'LIVRE') livre++;
            else if (s === 'INCIDENT') incident++;
            else pending++;
        });

        document.getElementById('cnt-livre').textContent    = livre;
        document.getElementById('cnt-incident').textContent = incident;
        document.getElementById('cnt-pending').textContent  = pending;
    } catch (e) { /* silencieux */ }
}

function updateCounters() {
    const livre    = parseInt(document.getElementById('cnt-livre').textContent) || 0;
    const incident = parseInt(document.getElementById('cnt-incident').textContent) || 0;

    if (currentDelivery?.status === 'LIVRE') {
        document.getElementById('cnt-livre').textContent = livre + 1;
    } else if (currentDelivery?.status === 'INCIDENT') {
        document.getElementById('cnt-incident').textContent = incident + 1;
    }
}

// ── RESET SCANNER ──
function resetScannerUI() {
    currentDelivery = null;
    capturedPhotos = [];
    document.getElementById('result-zone').innerHTML = '';
    document.getElementById('photos-section').style.display = 'none';
    document.getElementById('actions-grid').style.display = 'none';
    document.getElementById('manual-ref').value = '';
    document.getElementById('scan-label').textContent = 'Pointez vers un code-barres';
    
    isScanningPaused = false; // Réactive le scanner
    window._lastScan = ''; 
    window._lastScanTime = 0;
}

// ── NAVIGATION ÉCRANS ──
function showScreen(name) {
    if (name === 'scan' && currentScreen === 'scan') {
        resetScannerUI(); // Réinitialise si on clique sur l'onglet Scanner alors qu'on y est déjà
    }

    document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
    document.getElementById('screen-' + name).classList.remove('hidden');
    currentScreen = name;

    // Bottom nav
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.querySelectorAll(`[id^="nav-${name}"]`).forEach(n => n.classList.add('active'));

    if (name === 'history') renderHistory();
}

// ── TOAST ──
let toastTimer;
function showToast(msg, type = '') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `show ${type}`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

// ── LOADING ──
function showLoading(show) {
    document.getElementById('loading').classList.toggle('show', show);
}
