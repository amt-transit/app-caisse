<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Suivi de colis — AMT Trans'it</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@500;700&family=Jost:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --amt-blue:#1A3553; --amt-blue-d:#13283f; --amt-red:#E51F21; --amt-gold:#FDC615;
    --green:#16a34a; --ink:#0f172a; --muted:#566273; --line:#e6ebf1;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; min-height:100vh; font-family:'Jost',system-ui,sans-serif; color:var(--ink);
    background:
      radial-gradient(1200px 500px at 50% -10%, rgba(26,53,83,.10), transparent),
      linear-gradient(180deg,#eef2f7,#e3e9f1);
    display:flex; align-items:flex-start; justify-content:center; padding:24px 16px 60px;
  }
  .card{ width:100%; max-width:480px; background:#fff; border-radius:20px; overflow:hidden;
    border:1px solid var(--line); box-shadow:0 24px 50px -18px rgba(26,53,83,.35); }
  .card__top{ background:var(--amt-blue); border-bottom:3px solid var(--amt-gold); padding:22px 24px; color:#fff; display:flex; align-items:center; gap:14px; }
  .logo{ width:52px; height:52px; display:flex; align-items:center; justify-content:center; font-size:24px; overflow:hidden; flex-shrink:0; }
  .logo img{ width:100%; height:100%; object-fit:contain; }
  .brand{ font-family:'Comfortaa',sans-serif; font-weight:700; font-size:18px; letter-spacing:.3px; }
  .brand small{ display:block; font-family:'Jost',sans-serif; font-weight:400; font-size:11.5px; opacity:.8; letter-spacing:.5px; text-transform:uppercase; }
  .body{ padding:24px; }
  .loading,.error{ text-align:center; color:var(--muted); padding:30px 10px; font-size:15px; }
  .spinner{ width:34px;height:34px;border:3px solid #d6deea;border-top-color:var(--amt-blue);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .rows{ margin-bottom:18px; }
  .row{ display:flex; justify-content:space-between; gap:12px; padding:9px 0; border-bottom:1px solid var(--line); font-size:14px; }
  .row:last-child{ border-bottom:none; }
  .k{ color:var(--muted); } .v{ font-weight:600; text-align:right; }
  .ref-pill{ background:#eef4fb; color:var(--amt-blue); padding:3px 10px; border-radius:8px; font-weight:700; font-family:'Comfortaa',sans-serif; }
  .parcel{ border:1px solid var(--line); border-radius:14px; padding:14px 14px 6px; margin-bottom:12px; }
  .parcel__h{ font-weight:700; color:var(--amt-blue); font-size:14px; margin-bottom:2px; }
  .parcel__d{ font-size:12px; color:var(--muted); margin-bottom:12px; }
  .steps{ display:flex; align-items:flex-start; }
  .step{ flex:1; text-align:center; position:relative; }
  .step .dot{ width:26px; height:26px; border-radius:50%; background:#e2e8f0; color:#94a3b8; display:flex; align-items:center; justify-content:center; font-size:13px; margin:0 auto 6px; position:relative; z-index:2; border:2px solid #e2e8f0; }
  .step.done .dot{ background:var(--green); border-color:var(--green); color:#fff; }
  .step.current .dot{ background:var(--amt-blue); border-color:var(--amt-blue); color:#fff; box-shadow:0 0 0 4px rgba(26,53,83,.15); }
  .step .lbl{ font-size:10.5px; color:var(--muted); line-height:1.3; }
  .step.done .lbl,.step.current .lbl{ color:var(--ink); font-weight:600; }
  /* ligne de liaison entre les étapes */
  .step::before{ content:''; position:absolute; top:13px; left:-50%; width:100%; height:3px; background:#e2e8f0; z-index:1; }
  .step:first-child::before{ display:none; }
  .step.done::before,.step.current::before{ background:var(--green); }
  .foot{ margin-top:8px; font-size:11.5px; color:var(--muted); text-align:center; line-height:1.5; }
</style>
</head>
<body>
  <div class="card">
    <div class="card__top">
      <div class="logo"><img src="LOGOAMT.png" alt="AMT Trans'it" onerror="this.parentNode.textContent='📦';"></div>
      <div class="brand">AMT Trans'it<small>Suivi de colis</small></div>
    </div>
    <div class="body" id="content">
      <div class="loading"><div class="spinner"></div>Chargement du suivi…</div>
    </div>
  </div>

<script>
  const FN_URL = "https://us-central1-caisse-amt-perso.cloudfunctions.net/verifyTracking";
  const STAGES = [
    { ic:'📥', lbl:'Entrepôt' },
    { ic:'📦', lbl:'Conteneur' },
    { ic:'🛬', lbl:'Arrivé' },
    { ic:'✅', lbl:'Livré' },
  ];
  const params = new URLSearchParams(location.search);
  const c = params.get('c');
  const id = params.get('id');
  const content = document.getElementById('content');
  function esc(s){ return String(s||'').replace(/[<>&"]/g, m => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[m])); }
  function fmtDate(d){ if(!d) return '—'; try{ return new Date(d).toLocaleDateString('fr-FR'); }catch(e){ return d; } }
  function showError(msg){ content.innerHTML = '<div class="error">⚠️ ' + esc(msg) + '</div>'; }

  function stepsHtml(stage){
    return '<div class="steps">' + STAGES.map((s, i) => {
      const cls = i < stage ? 'done' : (i === stage ? 'current' : '');
      const mark = i < stage ? '✓' : s.ic;
      return `<div class="step ${cls}"><div class="dot">${mark}</div><div class="lbl">${s.lbl}</div></div>`;
    }).join('') + '</div>';
  }

  async function run(){
    if(!c || !id){ showError("Lien de suivi invalide ou incomplet."); return; }
    try {
      const resp = await fetch(`${FN_URL}?c=${encodeURIComponent(c)}&id=${encodeURIComponent(id)}`);
      const data = await resp.json();
      if(!data || !data.ok){ showError("Suivi indisponible pour le moment."); return; }
      if(!data.found){ showError("Aucun colis ne correspond à ce lien."); return; }

      const colis = Array.isArray(data.colis) ? data.colis : [];
      const infos = `
        <div class="rows">
          <div class="row"><span class="k">Référence</span><span class="v"><span class="ref-pill">${esc(data.reference) || '—'}</span></span></div>
          ${data.destinataire ? `<div class="row"><span class="k">Destinataire</span><span class="v">${esc(data.destinataire)}</span></div>` : ''}
          ${data.commune ? `<div class="row"><span class="k">Livraison</span><span class="v">${esc(data.commune)}</span></div>` : ''}
          ${data.conteneur ? `<div class="row"><span class="k">Conteneur</span><span class="v">${esc(data.conteneur)}</span></div>` : ''}
        </div>`;

      const parcels = colis.length
        ? colis.map(p => `
            <div class="parcel">
              <div class="parcel__h">📦 ${esc(p.label)}</div>
              ${p.desc ? `<div class="parcel__d">${esc(p.desc)}</div>` : '<div class="parcel__d"></div>'}
              ${stepsHtml(Number(p.stage) || 0)}
            </div>`).join('')
        : '<div class="error">Aucun colis rattaché à cette référence pour le moment.</div>';

      content.innerHTML = infos + parcels + `
        <div class="foot">Suivi en direct depuis le système <b>AMT Trans'it</b> · ${fmtDate(data.checkedAt)}.</div>`;
    } catch(e){
      showError("Connexion impossible. Vérifiez votre réseau et réessayez.");
    }
  }
  run();
</script>
</body>
</html>
