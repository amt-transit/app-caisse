<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Connexion - AMT Transit</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        /* Éléments décoratifs de fond */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="rgba(255,255,255,0.05)" fill-opacity="1" d="M0,96L48,112C96,128,192,160,288,160C384,160,480,128,576,122.7C672,117,768,139,864,154.7C960,171,1056,181,1152,165.3C1248,149,1344,107,1392,85.3L1440,64L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>');
            background-repeat: no-repeat;
            background-position: bottom;
            background-size: cover;
            opacity: 0.3;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.03) 0%, transparent 70%);
            pointer-events: none;
        }

        /* Conteneur principal - centrage parfait */
        .login-container {
            width: 100%;
            padding: 20px;
            position: relative;
            z-index: 10;
        }

        /* Carte de connexion */
        .login-card {
            max-width: 440px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 40px 36px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .login-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.3);
        }

        /* Logo */
        .logo-wrapper {
            text-align: center;
            margin-bottom: 28px;
        }

        .logo-wrapper img {
            height: 85px; /* Ajusté pour intégrer le padding */
            width: auto;
            background: #1e293b; /* Fond sombre élégant pour faire ressortir le blanc */
            padding: 12px 24px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.15);
            transition: all 0.3s ease;
        }

        .logo-wrapper img:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 30px -5px rgba(0, 0, 0, 0.25);
        }

        /* Titre */
        .login-title {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-title h2 {
            font-size: 28px;
            font-weight: 700;
            color: #1e293b;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .login-title p {
            font-size: 14px;
            color: #64748b;
            font-weight: 400;
        }

        /* Groupes de formulaire */
        .form-group {
            margin-bottom: 24px;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #475569;
            margin-bottom: 8px;
            letter-spacing: 0.3px;
        }

        .input-icon {
            position: relative;
        }

        .input-icon span {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            pointer-events: none;
            color: #94a3b8;
        }

        .input-icon input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            font-size: 14px;
            font-weight: 500;
            color: #1e293b;
            background: #f8fafc;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
        }

        .input-icon input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .input-icon input::placeholder {
            color: #cbd5e1;
            font-weight: 400;
        }

        /* Champ mot de passe avec toggle */
        .password-wrapper {
            position: relative;
        }

        .password-wrapper input {
            padding-right: 48px;
        }

        .toggle-password {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 20px;
            background: none;
            border: none;
            padding: 0;
            color: #94a3b8;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
        }

        .toggle-password:hover {
            color: #667eea;
        }

        /* Bouton de connexion */
        .login-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-family: 'Inter', sans-serif;
            margin-top: 8px;
            position: relative;
            overflow: hidden;
        }

        .login-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .login-btn:hover::before {
            left: 100%;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(102, 126, 234, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn:disabled {
            opacity: 0.7;
            transform: none;
            cursor: not-allowed;
        }

        .btn-icon {
            font-size: 18px;
        }

        /* Message d'erreur */
        .error-message {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 500;
            margin-top: 20px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .error-message::before {
            content: '⚠️';
            font-size: 14px;
        }

        /* Footer */
        .login-footer {
            text-align: center;
            margin-top: 28px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
        }

        .login-footer p {
            font-size: 12px;
            color: #94a3b8;
        }

        /* Animation */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-card {
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Responsive */
        @media (max-width: 640px) {
            .login-card {
                padding: 32px 24px;
                margin: 0 16px;
            }

            .login-title h2 {
                font-size: 24px;
            }

            .logo-wrapper img {
                height: 70px;
                padding: 10px 20px;
            }

            .input-icon input {
                padding: 12px 14px 12px 44px;
                font-size: 16px; /* Empêche zoom sur iOS */
            }
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 28px 20px;
            }

            .login-title h2 {
                font-size: 22px;
            }

            .login-title p {
                font-size: 13px;
            }

            .form-group {
                margin-bottom: 20px;
            }

            .login-btn {
                padding: 14px;
                font-size: 15px;
            }
        }

        /* Support pour très grands écrans */
        @media (min-width: 1600px) {
            .login-card {
                max-width: 500px;
                padding: 48px 44px;
            }

            .logo-wrapper img {
                height: 105px;
                padding: 16px 32px;
            }

            .login-title h2 {
                font-size: 32px;
            }

            .input-icon input {
                padding: 16px 18px 16px 50px;
                font-size: 15px;
            }
        }

        /* Mode sombre automatique (optionnel) */
        @media (prefers-color-scheme: dark) {
            body {
                background: linear-gradient(135deg, #1e1b4b 0%, #4c1d95 100%);
            }
            
            .login-card {
                background: rgba(30, 41, 59, 0.98);
                border-color: rgba(255,255,255,0.1);
            }

            .login-title h2 {
                color: #f1f5f9;
            }

            .login-title p {
                color: #94a3b8;
            }

            .form-group label {
                color: #cbd5e1;
            }

            .input-icon input {
                background: #1e293b;
                border-color: #334155;
                color: #f1f5f9;
            }

            .input-icon input:focus {
                border-color: #818cf8;
                background: #1e293b;
            }

            .input-icon span {
                color: #64748b;
            }

            .login-footer {
                border-top-color: #334155;
            }

            .login-footer p {
                color: #64748b;
            }
        }

        /* Loader animation */
        .loader {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-card">
            <div class="logo-wrapper">
                <img src="LOGOAMT.png" alt="AMT Transit Logo">
            </div>

            <div class="login-title">
                <h2>Bienvenue</h2>
                <p>Connectez-vous à votre espace</p>
            </div>

            <div class="form-group">
                <label>Identifiant</label>
                <div class="input-icon">
                    <span>👤</span>
                    <input type="text" id="username" placeholder="Nom d'utilisateur" autocomplete="username" required>
                </div>
            </div>

            <div class="form-group">
                <label>Mot de passe</label>
                <div class="input-icon password-wrapper">
                    <span>🔒</span>
                    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
                    <button type="button" class="toggle-password" id="togglePassword" title="Afficher/Masquer">
                        👁️
                    </button>
                </div>
            </div>

            <button id="loginBtn" class="login-btn">
                <span class="btn-icon">🔑</span>
                <span>Se connecter</span>
            </button>

            <div id="loginError" class="error-message" style="display: none;"></div>

            <div class="login-footer">
                <p>&copy; 2024 AMT Transit - Tous droits réservés</p>
            </div>
        </div>
    </div>

    <script type="module" src="login.js"></script>
    <script>
        // Gestion de l'affichage du mot de passe
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');

        togglePassword.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            togglePassword.textContent = type === 'password' ? '👁️' : '🙈';
            togglePassword.style.opacity = '0.7';
            setTimeout(() => {
                togglePassword.style.opacity = '1';
            }, 200);
        });

        // Connexion avec la touche Entrée
        const handleKeyPress = (e) => {
            if (e.key === 'Enter') {
                document.getElementById('loginBtn').click();
            }
        };
        
        document.getElementById('username').addEventListener('keypress', handleKeyPress);
        document.getElementById('password').addEventListener('keypress', handleKeyPress);

        // Focus automatique sur le premier champ
        document.getElementById('username').focus();
    </script>
</body>
</html>
